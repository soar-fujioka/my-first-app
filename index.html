<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Digital Clock</title>
  <style>
    :root {
      --bg-1: #050510;
      --bg-2: #0a1230;
      --neon-cyan: #25f4ff;
      --neon-pink: #ff4bd8;
      --neon-blue: #5a8dff;
      --text-soft: #b9d4ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "SF Mono", "Roboto Mono", "JetBrains Mono", monospace;
      background:
        radial-gradient(circle at 20% 25%, rgba(37, 244, 255, 0.2), transparent 40%),
        radial-gradient(circle at 80% 75%, rgba(255, 75, 216, 0.2), transparent 42%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      color: #fff;
      overflow: hidden;
    }

    .scanline {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.05) 0,
        rgba(255, 255, 255, 0.05) 1px,
        transparent 2px,
        transparent 4px
      );
      opacity: 0.08;
      mix-blend-mode: soft-light;
    }

    .clock-shell {
      position: relative;
      width: min(92vw, 760px);
      padding: 2rem 2.2rem;
      border: 1px solid rgba(144, 182, 255, 0.45);
      border-radius: 24px;
      background: rgba(8, 16, 42, 0.45);
      backdrop-filter: blur(7px);
      box-shadow:
        0 0 18px rgba(37, 244, 255, 0.35),
        0 0 40px rgba(90, 141, 255, 0.25),
        inset 0 0 24px rgba(255, 75, 216, 0.14);
      text-align: center;
    }

    .clock-shell::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 24px;
      background: linear-gradient(120deg, rgba(37, 244, 255, 0.8), rgba(255, 75, 216, 0.8), rgba(90, 141, 255, 0.8));
      z-index: -1;
      filter: blur(11px);
      opacity: 0.55;
    }

    .label {
      margin: 0 0 0.9rem;
      font-size: clamp(0.8rem, 2vw, 1rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-soft);
      text-shadow: 0 0 8px rgba(185, 212, 255, 0.7);
    }

    #clock {
      margin: 0;
      font-size: clamp(2.2rem, 10vw, 6.4rem);
      letter-spacing: 0.08em;
      line-height: 1.1;
      color: #dfffff;
      text-shadow:
        0 0 8px rgba(37, 244, 255, 0.8),
        0 0 18px rgba(37, 244, 255, 0.8),
        0 0 32px rgba(255, 75, 216, 0.5),
        0 0 56px rgba(90, 141, 255, 0.5);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }

    #date {
      margin: 0.8rem 0 0;
      color: #deebff;
      font-size: clamp(0.78rem, 2.2vw, 1.1rem);
      letter-spacing: 0.1em;
      opacity: 0.92;
      text-shadow: 0 0 8px rgba(90, 141, 255, 0.6);
    }
  </style>
</head>
<body>
  <div class="clock-shell" aria-live="polite">
    <p class="label">Neon Digital Clock</p>
    <h1 id="clock">00:00:00</h1>
    <p id="date">----/--/--</p>
  </div>
  <div class="scanline" aria-hidden="true"></div>

  <script>
    const clockElement = document.getElementById("clock");
    const dateElement = document.getElementById("date");

    const pad = (value) => String(value).padStart(2, "0");

    function updateClock() {
      const now = new Date();
      const hh = pad(now.getHours());
      const mm = pad(now.getMinutes());
      const ss = pad(now.getSeconds());
      clockElement.textContent = `${hh}:${mm}:${ss}`;

      const yyyy = now.getFullYear();
      const mo = pad(now.getMonth() + 1);
      const dd = pad(now.getDate());
      const week = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"][now.getDay()];
      dateElement.textContent = `${yyyy}/${mo}/${dd} ${week}`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
